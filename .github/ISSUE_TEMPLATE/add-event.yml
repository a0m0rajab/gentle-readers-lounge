name: "Add New Book Event"
description: "Submit a new event for an existing book in the Gentle Readers Lounge."
title: "[Event]: "
labels:
  - "add-event"
body:
  - type: input
    id: book_slug
    attributes:
      label: Book Slug
      description: "The slug of the book this event belongs to (must match an existing book file)"
      placeholder: "e.g. the-midnight-library"
    validations:
      required: true

  - type: input
    id: event_id
    attributes:
      label: Event ID
      description: "Unique identifier for this event (e.g. midnight-library-mar-2025)"
      placeholder: "e.g. midnight-library-mar-2025"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Event Date
      description: "Full date of the event (e.g. March 20, 2025)"
      placeholder: "e.g. March 20, 2025"
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      placeholder: "e.g. Inkwell Café, Downtown"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Event Description
      description: "A short description of the event."
      placeholder: "Describe what happened at the event..."
    validations:
      required: true

  - type: input
    id: attendee_count
    attributes:
      label: Attendee Count
      placeholder: "e.g. 24"
    validations:
      required: true

  - type: textarea
    id: attendees
    attributes:
      label: Attendees
      description: "Enter one attendee per line in the format: Full Name"
      placeholder: |
        Sarah Mitchell
        James Chen
        Olivia Rose
    validations:
      required: true

  - type: textarea
    id: highlights
    attributes:
      label: Event Highlights
      description: "Enter each highlight on its own line."
      placeholder: |
        Discussed the central themes of identity and loss
        Explored the author's use of magical realism
        Members shared personal connections to the story
    validations:
      required: true

  - type: textarea
    id: images
    attributes:
      label: Photo URLs
      description: "Enter one image URL per line."
      placeholder: |
        https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=600&h=400&fit=crop
        https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=600&h=400&fit=crop

  - type: textarea
    id: captions
    attributes:
      label: Photo Captions
      description: "Enter one caption per line, matching the order of the photo URLs above."
      placeholder: |
        Setting up for the evening
        Deep in discussion

  - type: input
    id: featured
    attributes:
      label: Featured Photo Number
      description: "Enter the number (1-based) of the photo to feature. Defaults to 1 if photos are provided."
      placeholder: "e.g. 1"
